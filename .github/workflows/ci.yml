name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-8.2-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.2-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPCS
        run: vendor/bin/phpcs

      - name: Psalm
        run: vendor/bin/psalm --no-progress

      - name: PHPUnit
        run: vendor/bin/phpunit

  deps-lowest:
    name: Lowest Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-8.2-lowest-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.2-lowest-

      - name: Install lowest dependencies
        run: composer update --prefer-lowest --prefer-stable --prefer-dist --no-progress --no-interaction

      - name: PHPUnit
        run: vendor/bin/phpunit

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-8.2-coverage-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.2-coverage-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit with coverage
        run: |
          mkdir -p build/logs
          XDEBUG_MODE=coverage vendor/bin/phpunit \
            --coverage-clover build/logs/clover.xml \
            --coverage-text

      - name: Enforce coverage gate
        run: php php/tools/coverage-gate.php build/logs/clover.xml

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: build/logs

  compat-matrix:
    name: Compat PHP${{ matrix.php }} Symfony${{ matrix.symfony }} ${{ matrix.deps }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        symfony: ['6.4', '7.4']
        deps: ['prefer-stable', 'prefer-lowest-prefer-stable']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-${{ matrix.deps }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-${{ matrix.deps }}-

      - name: Update dependencies (${{ matrix.deps }}, Symfony ${{ matrix.symfony }})
        run: |
          if [ ! -f composer.lock ]; then
            if [ "${{ matrix.deps }}" = "prefer-lowest-prefer-stable" ]; then
              composer update \
                --prefer-lowest \
                --prefer-stable \
                --prefer-dist \
                --no-progress \
                --no-interaction \
                --with-all-dependencies
            else
              composer update \
                --prefer-stable \
                --prefer-dist \
                --no-progress \
                --no-interaction \
                --with-all-dependencies
            fi
          fi

          if [ "${{ matrix.deps }}" = "prefer-lowest-prefer-stable" ]; then
            composer update \
              --prefer-lowest \
              --prefer-stable \
              --prefer-dist \
              --no-progress \
              --no-interaction \
              --with-all-dependencies \
              "symfony/http-kernel:^${{ matrix.symfony }}" \
              "symfony/config:^${{ matrix.symfony }}" \
              "symfony/console:^${{ matrix.symfony }}" \
              "symfony/dependency-injection:^${{ matrix.symfony }}" \
              "symfony/http-foundation:^${{ matrix.symfony }}"
          else
            composer update \
              --prefer-stable \
              --prefer-dist \
              --no-progress \
              --no-interaction \
              --with-all-dependencies \
              "symfony/http-kernel:^${{ matrix.symfony }}" \
              "symfony/config:^${{ matrix.symfony }}" \
              "symfony/console:^${{ matrix.symfony }}" \
              "symfony/dependency-injection:^${{ matrix.symfony }}" \
              "symfony/http-foundation:^${{ matrix.symfony }}"
          fi

      - name: PHPUnit
        run: vendor/bin/phpunit
